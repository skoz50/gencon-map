<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GenCon Map — Gen Con Indy Schedule & Venue Map</title>
  <meta name="description" content="Shareable Gen Con Indy schedule and interactive venue map, built for at-the-con use.">

  <!-- Leaflet from unpkg CDN -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>GenCon Map</h1>
    <p class="tagline">Gen Con Indy 2026 — schedule &amp; venue map</p>
  </header>

  <main>
    <section id="schedule-panel">
      <h2>Schedule</h2>
      <div id="now-next" class="now-next-card" hidden></div>
      <div id="schedule">
        <p class="empty-state">Loading schedule&hellip;</p>
      </div>
    </section>

    <section id="map-panel">
      <h2>Venue Map</h2>
      <div id="map" style="height: 400px;"></div>
    </section>
  </main>

  <footer>
    <p>GenCon Map &middot; <a href="https://github.com/skoz50/gencon-map">source</a></p>
  </footer>

  <!-- Time-override test panel — dev tool, also handy at-the-con. -->
  <button id="test-toggle" class="test-toggle" aria-label="Toggle time-override panel">🧪</button>
  <div id="test-panel" class="test-panel" hidden>
    <div class="test-panel__header">
      <span class="test-panel__title">Time override</span>
      <button id="test-close" class="test-panel__close" aria-label="Close panel">✕</button>
    </div>
    <p id="test-status" class="test-panel__status">Showing: live time</p>
    <div id="test-presets" class="test-panel__presets"></div>
    <div class="test-panel__custom">
      <input type="datetime-local" id="test-datetime" class="test-panel__input">
      <button id="test-apply" class="test-panel__apply">Apply</button>
    </div>
    <button id="test-live" class="test-panel__live">Live (clear override)</button>
    <!-- Pick-coords dev tool — distinct from the time presets above. When
         active, every map click console.logs its { lat, lng } for copy-paste
         into venues.json's rooms scaffold. Ships permanently. -->
    <button id="test-pick-coords" class="test-panel__pick" aria-pressed="false">
      📍 Pick coords
    </button>
  </div>

  <script type="module">
    // Pure time logic lives in js/time.js — see that module for the
    // event-local-TZ rationale. Everything else (DOM, render, map) is inline.
    import {
      eventLocalDayKey, formatDayHeader, formatEventTime,
      getNow, setNowOverride, getNowOverride,
      formatDuration, computeNowNext
    } from './js/time.js';

    // ---- Config -------------------------------------------------------------
    const YEAR = 2026;
    const INDY_CENTER = [39.7639, -86.1639]; // downtown Indianapolis
    const INDY_ZOOM = 16;

    // ---- Map ----------------------------------------------------------------
    const map = L.map('map').setView(INDY_CENTER, INDY_ZOOM);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // ---- Pick-coords dev tool ----------------------------------------------
    // Toggled from the 🧪 panel. When active, any map click — empty tile or
    // marker alike — logs its { lat, lng } to the console, formatted to drop
    // straight into venues.json's rooms scaffold. We don't preventDefault, so
    // marker popups and the card→map flow still fire normally. Ships
    // permanently as a dev tool — no build-time strip.
    let pickCoordsActive = false;
    map.on('click', e => {
      if (!pickCoordsActive) return;
      console.log(
        `{ "lat": ${e.latlng.lat.toFixed(6)}, "lng": ${e.latlng.lng.toFixed(6)} }`
      );
    });

    // ---- Marker icons -------------------------------------------------------
    // Room pin: a teal divIcon the venue marker swaps to when a card with room
    // coords is tapped. ~24px — smaller than Leaflet's ~41px default so it
    // reads as a precise room locator, not the building marker. An 18px solid
    // dot inside a 24px ring; anchored bottom-centre so it sits on the click
    // point like a standard marker. Styling is inline in the html string, so
    // the icon is self-contained here with no style.css dependency.
    const roomIcon = L.divIcon({
      className: 'room-pin', // replaces Leaflet's default .leaflet-div-icon chrome
      iconSize:    [24, 24],
      iconAnchor:  [12, 24],
      popupAnchor: [0, -24],
      html:
        '<div style="width:24px;height:24px;box-sizing:border-box;' +
        'border:2px solid #0d9488;border-radius:50%;' +
        'background:rgba(13,148,136,0.18);' +
        'display:flex;align-items:center;justify-content:center;">' +
        '<div style="width:18px;height:18px;border-radius:50%;' +
        'background:#0d9488;"></div></div>'
    });

    // Leaflet's stock blue marker — the building-entrance default. Held once so
    // focusEventOnMap can reset a marker previously swapped to a room pin.
    const defaultIcon = new L.Icon.Default();

    // Venue marker popup: building name + optional description. Shared by the
    // initial render and focusEventOnMap's reset-to-building path.
    function venuePopupHtml(v) {
      return `<strong>${v.building || 'Venue'}</strong>` +
        (v.description ? `<br>${v.description}` : '');
    }

    // ---- Render: venue markers ---------------------------------------------
    function renderVenues(venues) {
      if (!venues || venues.length === 0) return;
      venues.forEach(v => {
        if (typeof v.lat !== 'number' || typeof v.lng !== 'number') return;
        const marker = L.marker([v.lat, v.lng]).addTo(map);
        // autoPan off: focusEventOnMap already setViews the marker to centre,
        // and an autoPan pan fired from openPopup would interrupt that
        // animation mid-flight (leaving the map short of the venue).
        marker.bindPopup(venuePopupHtml(v), { autoPan: false });
        // Closing a popup via the map's × clears the card selection it came
        // from. Opening a different marker's popup also fires this — harmless,
        // since focusEventOnMap re-sets .selected *after* the open.
        marker.on('popupclose', clearSelectedCard);
        if (v.id) markers[v.id] = marker;
      });
    }

    // ---- Card → map: pan to venue, open popup, select ----------------------
    // venue_id-keyed Leaflet markers, populated by renderVenues above.
    const markers = {};

    // Single-select: a card stays .selected until another is tapped or its
    // marker popup is closed.
    function clearSelectedCard() {
      document.querySelectorAll('.event-card.selected')
        .forEach(el => el.classList.remove('selected'));
    }

    // Tapping an event card pans the map to its venue, opens the marker
    // popup, and marks the card selected. On a phone (map stacked below the
    // schedule) it also scrolls the map into view when it's below the fold.
    function focusEventOnMap(event, card) {
      const venue = venuesCache.find(v => v.id === event.venue_id);
      const marker = venue ? markers[event.venue_id] : null;

      clearSelectedCard();

      if (venue && typeof venue.lat === 'number' && typeof venue.lng === 'number') {
        // Resolve the pan target: prefer the room's pin-coord override when the
        // venue's rooms map carries non-null lat AND lng for this event's room;
        // otherwise fall back to the venue's building coords. Both-or-nothing,
        // same rule as the floor/wing fallback — no partial use.
        const room = venue.rooms && event.room ? venue.rooms[event.room] : null;
        const useRoom = room && room.lat != null && room.lng != null;
        const lat = useRoom ? room.lat : venue.lat;
        const lng = useRoom ? room.lng : venue.lng;

        // Swap this venue's marker to match. With a room override it moves to
        // the room coords, takes the teal room-pin icon, and its popup becomes
        // "<building> · <room>". Without one it resets to the building
        // entrance, the default blue icon, and the plain building popup. The
        // marker holds that state until the next card tap — no auto-revert —
        // and only this venue's marker is touched, so other venues' markers
        // stay wherever a prior tap left them.
        if (marker) {
          marker.setLatLng([lat, lng]);
          marker.setIcon(useRoom ? roomIcon : defaultIcon);
          marker.setPopupContent(
            useRoom
              ? `<strong>${venue.building} · ${event.room}</strong>`
              : venuePopupHtml(venue)
          );
        }

        // Keep the user's zoom if they're already past cluster level; the
        // venues sit blocks apart, so 17 frames a single one well.
        const zoom = map.getZoom() > INDY_ZOOM ? map.getZoom() : 17;
        map.setView([lat, lng], zoom, { animate: true });
      }

      // Open the popup *before* setting .selected: opening a popup auto-closes
      // any other one, firing 'popupclose' -> clearSelectedCard. Doing it
      // first means that sweep can't wipe the class we set next.
      if (marker) marker.openPopup();
      card.classList.add('selected');

      // Mobile: bring the map up if it's below the fold. On desktop the map
      // sits beside the schedule and is always in view, so this is a no-op.
      const mapEl = document.getElementById('map');
      if (mapEl.getBoundingClientRect().top > window.innerHeight - 100) {
        mapEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    // ---- Render: event cards grouped by day --------------------------------
    // Time parsing/formatting + day grouping live in js/time.js.

    function renderEvents(events) {
      const container = document.getElementById('schedule');
      container.innerHTML = '';

      if (!events || events.length === 0) {
        const msg = document.createElement('p');
        msg.className = 'empty-state';
        msg.textContent = `No events yet — add to data/${YEAR}/events.json`;
        container.appendChild(msg);
        return;
      }

      // Sort chronologically by start, then group by event-local calendar
      // date. Sorting first means both the day groups and the events within
      // them come out in time order via Map first-seen insertion. The day key
      // is event-local (offset-aware), so a late-Eastern event never drifts
      // onto the browser's adjacent calendar day.
      const sorted = events.slice().sort((a, b) => new Date(a.start) - new Date(b.start));

      const byDay = new Map();
      sorted.forEach(e => {
        const key = eventLocalDayKey(e.start);
        if (!byDay.has(key)) byDay.set(key, []);
        byDay.get(key).push(e);
      });

      byDay.forEach((dayEvents, dayKey) => {
        const dayHeading = document.createElement('h3');
        dayHeading.className = 'day-heading';
        dayHeading.textContent = formatDayHeader(dayKey);
        container.appendChild(dayHeading);

        dayEvents.forEach(e => {
          const card = document.createElement('article');
          card.className = 'event-card';
          if (e.id) card.dataset.eventId = e.id;

          const title = document.createElement('h4');
          title.textContent = e.title || 'Untitled event';
          card.appendChild(title);

          const meta = document.createElement('p');
          meta.className = 'event-meta';
          if (e.start && e.end) {
            meta.textContent = formatEventTime(e.start, e.end);
          } else if (e.start) {
            meta.textContent = formatEventTime(e.start);
          }
          card.appendChild(meta);

          // Location line. When the venue's rooms map carries non-null
          // floor + wing for this room, render the granular form
          // ("📍 <building> · <ordinal> floor, <wing> wing · <room>") with an
          // optional muted notes subline. Missing room entry, or either of
          // floor/wing null, falls back cleanly to bare "<building> · <room>"
          // — no partial render, no console warning.
          const venueEl = document.createElement('p');
          venueEl.className = 'event-venue';
          const venueObj = venueForEvent(e);
          const building = venueObj ? venueObj.building : 'TBD';
          const roomData =
            venueObj && venueObj.rooms && e.room ? venueObj.rooms[e.room] : null;

          if (roomData && roomData.floor != null && roomData.wing != null) {
            venueEl.textContent =
              `📍 ${building} · ${ordinal(roomData.floor)} floor, ` +
              `${roomData.wing} wing · ${e.room}`;
            if (roomData.notes) {
              const notes = document.createElement('span');
              notes.className = 'event-card-room-notes';
              notes.textContent = roomData.notes;
              venueEl.appendChild(notes);
            }
          } else {
            venueEl.textContent = e.room ? `${building} · ${e.room}` : building;
          }
          card.appendChild(venueEl);

          // Tap → pan the map to this event's venue (see focusEventOnMap).
          card.addEventListener('click', () => focusEventOnMap(e, card));

          container.appendChild(card);
        });
      });
    }

    // ---- Now / Next: time-aware schedule status ----------------------------
    // Trip window — the feature is dormant outside these bounds, leaving the
    // static schedule untouched.
    const TRIP_START = new Date('2026-07-29T00:00:00-04:00');
    const TRIP_END   = new Date('2026-08-03T23:59:59-04:00');

    let eventsCache = [];
    let venuesCache = [];

    // Resolve an event's venue object via venue_id -> venues[].id.
    function venueForEvent(event) {
      return venuesCache.find(v => v.id === event.venue_id) || null;
    }

    // Resolve an event's venue building name (see venueForEvent).
    function buildingForEvent(event) {
      const venue = venueForEvent(event);
      return venue ? venue.building : 'TBD';
    }

    // English ordinal suffix for a positive integer: 1->1st, 2->2nd, 3->3rd,
    // 11->11th, 21->21st. Used for the floor in the granular location line.
    function ordinal(n) {
      const s = ['th', 'st', 'nd', 'rd'];
      const v = n % 100;
      return n + (s[(v - 20) % 10] || s[v] || s[0]);
    }

    function highlightCard(eventId, cls) {
      const el = document.querySelector(`.event-card[data-event-id="${eventId}"]`);
      if (el) el.classList.add(cls);
    }

    // Append the 🚶 walking-time line to the Now/Next card. `walkTime` is the
    // { minutes, note } object from computeNowNext; `next` supplies the
    // destination building. The note ("via skywalk") doubles as the verb when
    // present, otherwise a plain "walk".
    function appendWalkLine(cardEl, walkTime, next) {
      const line = document.createElement('span');
      line.className = 'now-next-walk';
      const verb = walkTime.note || 'walk';
      line.textContent =
        `🚶 ~${walkTime.minutes} min ${verb} to ${buildingForEvent(next)}`;
      cardEl.appendChild(line);
    }

    // Recompute current/next from wall-clock time; refresh card + highlights.
    // Both the card and the highlight classes update from this single pass.
    function recomputeNowNext() {
      const cardEl = document.getElementById('now-next');
      const n = getNow();

      // Drop highlight classes from the previous tick so nothing accumulates.
      document.querySelectorAll('.event-card--current, .event-card--next')
        .forEach(el => el.classList.remove('event-card--current', 'event-card--next'));

      // Outside the trip window: purely static schedule, no card.
      if (n < TRIP_START || n > TRIP_END) {
        cardEl.hidden = true;
        cardEl.textContent = '';
        return;
      }

      const { current, next, walkTime } = computeNowNext(eventsCache, n, venuesCache);

      if (current) {
        const msLeft = new Date(current.end) - n;
        cardEl.textContent =
          `🔴 Now: ${current.title} at ${buildingForEvent(current)} · ends in ${formatDuration(msLeft)}`;
        // Third line: walking time to the next venue (current -> next, only
        // across venues — see computeNowNext). textContent above reset the
        // card to a single text node; append the walk span after it.
        if (walkTime) appendWalkLine(cardEl, walkTime, next);
        cardEl.hidden = false;
        highlightCard(current.id, 'event-card--current');
        if (next) highlightCard(next.id, 'event-card--next');
      } else if (next) {
        const msUntil = new Date(next.start) - n;
        cardEl.textContent =
          `⏭ Next: ${next.title} at ${buildingForEvent(next)} · starts in ${formatDuration(msUntil)}`;
        cardEl.hidden = false;
        highlightCard(next.id, 'event-card--next');
      } else {
        // After the last event but still inside the trip window — hide card.
        cardEl.hidden = true;
        cardEl.textContent = '';
      }
    }

    // ---- Time-override test panel ------------------------------------------
    // Presets: trip-window moments use a fixed ISO string with the EDT (-04:00)
    // offset; the "Today" preset is built from the user's local clock.
    const TEST_PRESETS = [
      { label: 'Thu 4:00 PM · mid Dark Redwood',            iso: '2026-07-30T16:00:00-04:00' },
      { label: 'Thu 9:45 PM · end Monster Unbound',         iso: '2026-07-30T21:45:00-04:00' },
      { label: 'Sat 3:55 PM · sprint Alas Poor Will → Stadium', iso: '2026-08-01T15:55:00-04:00' },
      { label: 'Sat 11:30 PM · mid Sorcery Casual',         iso: '2026-08-01T23:30:00-04:00' },
      { label: 'Sun 11:45 AM · Verhey/Mega Draft overlap',  iso: '2026-08-02T11:45:00-04:00' },
      { label: 'Mon 2:00 PM · after last event',            iso: '2026-08-03T14:00:00-04:00' },
      { label: 'Today 7:00 AM · outside window',            today7am: true }
    ];

    function formatOverride(d) {
      return d.toLocaleString('en-US', {
        weekday: 'short', month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit', timeZoneName: 'short'
      });
    }

    function updateTestStatus() {
      const override = getNowOverride();
      document.getElementById('test-status').textContent =
        override === null
          ? 'Showing: live time'
          : 'Showing: ' + formatOverride(override);
    }

    // Set (or clear) the override, then re-render the card + highlights.
    function applyOverride(date) {
      setNowOverride(date);
      recomputeNowNext();
      updateTestStatus();
    }

    function initTestPanel() {
      const panel  = document.getElementById('test-panel');
      const toggle = document.getElementById('test-toggle');

      toggle.addEventListener('click', () => {
        panel.hidden = !panel.hidden;
        toggle.classList.toggle('test-toggle--active', !panel.hidden);
      });
      document.getElementById('test-close').addEventListener('click', () => {
        panel.hidden = true;
        toggle.classList.remove('test-toggle--active');
      });

      const presetsEl = document.getElementById('test-presets');
      TEST_PRESETS.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'test-panel__preset';
        btn.textContent = p.label;
        btn.addEventListener('click', () => {
          let d;
          if (p.today7am) {
            d = new Date();
            d.setHours(7, 0, 0, 0);
          } else {
            d = new Date(p.iso);
          }
          applyOverride(d);
        });
        presetsEl.appendChild(btn);
      });

      document.getElementById('test-apply').addEventListener('click', () => {
        const val = document.getElementById('test-datetime').value;
        if (!val) return;
        const d = new Date(val); // datetime-local value parses as local TZ
        if (isNaN(d.getTime())) return;
        applyOverride(d);
      });

      document.getElementById('test-live').addEventListener('click', () => {
        applyOverride(null);
      });

      // Pick-coords toggle: flips pickCoordsActive and reflects the state on
      // the button itself (the --active class + aria-pressed) so the tool's
      // on/off status is always visible while the panel is open.
      const pickBtn = document.getElementById('test-pick-coords');
      pickBtn.addEventListener('click', () => {
        pickCoordsActive = !pickCoordsActive;
        pickBtn.classList.toggle('test-panel__pick--active', pickCoordsActive);
        pickBtn.setAttribute('aria-pressed', String(pickCoordsActive));
        pickBtn.textContent = pickCoordsActive
          ? '📍 Picking — click map'
          : '📍 Pick coords';
      });

      updateTestStatus();
    }
    initTestPanel();

    // ---- Fetch on load ------------------------------------------------------
    Promise.all([
      fetch(`data/${YEAR}/events.json`).then(r => r.json()),
      fetch(`data/${YEAR}/venues.json`).then(r => r.json())
    ])
      .then(([eventsData, venuesData]) => {
        eventsCache = eventsData.events || [];
        venuesCache = venuesData.venues || [];
        renderEvents(eventsCache);
        renderVenues(venuesCache);
        recomputeNowNext();
        setInterval(recomputeNowNext, 60000);
      })
      .catch(err => {
        console.error('Failed to load data:', err);
        document.getElementById('schedule').innerHTML =
          '<p class="empty-state">Could not load schedule data.</p>';
      });
  </script>
</body>
</html>
